<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية المحترف - محمد طه</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --primary: #8b5cf6; --gold: #f59e0b; --success: #10b981; --danger: #ef4444; --bg: #0f172a; }
        
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; min-height: 100vh; display: flex; justify-content: center; padding-bottom: 150px; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 500px; padding: 20px; position: relative; }
        
        /* شريط الاشتراك المحفز */
        .promo-float { position: fixed; top: 10px; left: 10px; right: 10px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border: 2px solid var(--gold); border-radius: 20px; padding: 15px; z-index: 2000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border-right: 8px solid var(--gold); }
        .promo-text b { color: var(--gold); font-size: 18px; display: block; }
        .promo-text span { font-size: 12px; opacity: 0.9; }
        .promo-btn { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; border: none; font-size: 14px; transition: 0.3s; }
        .promo-btn:hover { transform: scale(1.05); }

        header { text-align: center; margin: 100px 0 30px 0; padding: 25px; background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        header h1 { margin: 0; font-size: 24px; color: var(--primary); text-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
        header p { margin: 5px 0 0; font-size: 14px; color: var(--gold); font-weight: bold; }

        .tabs { display: flex; gap: 8px; margin-bottom: 25px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 20px; position: sticky; top: 105px; z-index: 1000; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; border-radius: 15px; font-size: 14px; color: #94a3b8; transition: 0.3s; font-weight: bold; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }
        
        .q-card { background: rgba(255,255,255,0.03); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .q-card p { font-size: 16px; font-weight: 700; line-height: 1.6; margin-bottom: 15px; }
        .opt { background: rgba(255,255,255,0.05); padding: 16px; margin: 12px 0; border-radius: 15px; cursor: pointer; text-align: right; font-size: 15px; transition: 0.2s; border: 1px solid transparent; }
        .opt:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .correct-opt { background: var(--success) !important; color: white; font-weight: bold; border-color: #fff; }
        .wrong-opt { background: var(--danger) !important; color: white; border-color: #fff; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 30px; width: 85%; text-align: center; border: 2px solid var(--primary); box-shadow: 0 0 50px rgba(139, 92, 246, 0.2); }
        
        /* زر تواصل ثابت إضافي */
        .wa-float { position: fixed; bottom: 25px; left: 25px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-decoration: none; font-size: 30px; z-index: 1500; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="promo-float" id="promoBar">
    <div class="promo-text">
        <b>يا بطل الطريق.. تعلم بذكاء!</b>
        <span>رسوم الكورس الشامل 30,000 ج.س فقط</span>
    </div>
    <button class="promo-btn" onclick="askName()">اشترك الآن</button>
</div>

<div class="app-container">
    <header>
        <h1>أكاديمية المحترف ⚙️</h1>
        <p>بإشراف الخبير: محمد طه عطا المنان</p>
        <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">سندك الفني في عالم المواتير والبطاريات بالسودان</div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="load('bat', this)">🔋 البطارية</div>
        <div class="tab" onclick="load('mot', this)">⚙️ الموتور</div>
        <div class="tab" onclick="load('con', this)">📟 الكنترول</div>
    </div>

    <div id="quiz-area"></div>
</div>

<a href="#" onclick="askName()" class="wa-float">💬</a>

<div class="modal" id="edu-modal">
    <div class="modal-content">
        <h3 id="status-title" style="color: var(--gold);">💡 معلومة فنية</h3>
        <p id="edu-text" style="font-size:16px; line-height:1.7; color:#cbd5e1;"></p>
        <button class="opt" style="width:100%; background:var(--primary); color:white; border:none; margin-top:20px; font-weight:bold;" onclick="closeModal()">استمر في الإبداع</button>
    </div>
</div>

<script>
    const db = {
        bat: [
            { q: "الجهد الكامل لبطارية 48v ليثيوم هو:", o: ["48v", "54.6v", "58v"], c: 1, e: "لأنها تتكون من 13 مجموعة خلايا متسلسلة (13S)، وكل مجموعة تشحن لـ 4.2 فولت." },
            { q: "ما هو سبب سخونة البطارية بشدة أثناء الشحن؟", o: ["شاحن سريع", "وجود خلية تالفة (Short)", "الجو حار"], c: 1, e: "الخلية التالفة لا تخزن الطاقة بل تحولها لحرارة، مما قد يسبب حريقاً." },
            { q: "أقل جهد (Cut-off) آمن لبطارية 60v هو:", o: ["50v", "40v", "48v"], c: 2, e: "عند 48 فولت يجب أن يفصل الكنترول لحماية الخلايا من الانهيار الكيميائي." },
            { q: "وظيفة سلك التوازن (Balance Wire):", o: ["زيادة السرعة", "تساوي الجهد بين الخلايا", "توصيل الأنوار"], c: 1, e: "يضمن أن كل مجموعة خلايا تشحن وتفرغ بنفس القيمة للحفاظ على عمر البطارية." },
            { q: "ماذا يعني Ah المكتوب على البطارية؟", o: ["سعة الطاقة", "سرعة الدراجة", "قوة الموتور"], c: 0, e: "يرمز للأمبير-ساعة، وهو مقدار الطاقة المخزنة التي تحدد المسافة المخطوعة." },
            { q: "هل يمكن شحن بطارية ليثيوم بشاحن أسيد؟", o: ["نعم", "لا (يسبب انفجار)", "أحياناً"], c: 1, e: "شاحن الأسيد يفتقد لنظام الفصل الدقيق لليثيوم، مما قد يرفع الجهد لمستوى خطر." },
            { q: "سبب ظهور علامة البطارية فارغة فور الانطلاق؟", o: ["الموتور ثقيل", "هبوط الجهد بسبب مقاومة الخلايا", "الفرامل عالقة"], c: 1, e: "هذا يسمى Voltage Drop، ويحدث عندما تكون الخلايا قديمة ولا تتحمل سحب التيار." },
            { q: "أفضل نسبة شحن لتخزين البطارية لفترة طويلة:", o: ["100%", "50-60%", "0%"], c: 1, e: "هذا يقلل الإجهاد الكيميائي على خلايا الليثيوم ويطيل عمرها." },
            { q: "ما هو الـ BMS؟", o: ["جهاز تبريد", "نظام حماية البطارية", "محول فولت"], c: 1, e: "هو العقل الذي يحمي البطارية من الشحن الزائد والتفريغ العميق والالتماس." },
            { q: "رائحة حمض من بطارية الأسيد تعني:", o: ["شحن ممتاز", "تبخر السائل وتلف الألواح", "قوة كهرباء"], c: 1, e: "تعني أن البطارية تغلي بسبب شحن زائد أو جفاف، ويجب استبدالها." },
            { q: "كيف تكتشف تلف مجموعة خلايا بدون فك؟", o: ["بقياس هبوط الجهد المفاجئ", "بلمس البطارية", "بالنظر"], c: 0, e: "إذا سقط الفولت بمقدار 4 فولت فجأة عند الضغط على المقبض، فهناك مجموعة تالفة." },
            { q: "عمر بطارية الليثيوم المعتاد هو:", o: ["100 دورة", "1000 دورة شحن", "10 سنوات"], c: 1, e: "تتحمل الليثيوم حوالي 1000 دورة تفريغ وشحن كاملة قبل أن تقل كفاءتها." },
            { q: "ما هو الجهد الاسمي لخلية الليثيوم؟", o: ["3.7v", "4.2v", "3.0v"], c: 0, e: "هو الجهد المتوسط، حيث تكون ممتلئة عند 4.2 وفارغة عند 3.0." },
            { q: "توصيل بطاريتين 48v على التوازي يزيد من:", o: ["الفولت (السرعة)", "الأمبير (المسافة)", "الوزن فقط"], c: 1, e: "التوازي يزيد السعة (Ah) مما يضاعف المسافة التي تقطعها الدراجة." },
            { q: "ماذا يسبب الالتماس (Short Circuit) في الأسلاك؟", o: ["احتراق الـ BMS فوراً", "سرعة الموتور", "لا شيء"], c: 0, e: "الـ BMS يفصل الكهرباء فوراً لحماية الخلايا من الانفجار بسبب السحب الهائل." },
            { q: "سبب تأخر البطارية في الشحن:", o: ["شاحن ضعيف", "تلف خلايا", "كلاهما صحيح"], c: 2, e: "الشاحن الضعيف أو الخلايا التي لا تقبل الشحن بسرعة تزيد من وقت الانتظار." },
            { q: "هل الحرارة العالية تضر البطارية؟", o: ["نعم (تسرع التلف)", "لا", "تزيد القوة"], c: 0, e: "الحرارة الزائدة تسرع التفاعلات الجانبية الضارة وتقلل عمر البطارية." },
            { q: "وظيفة صمام الأمان في خلية الليثيوم:", o: ["للشحن", "تنفيس الغاز عند الضغط الزائد", "للزينة"], c: 1, e: "يمنع انفجار الخلية في حال حدوث تفاعل حراري عن طريق إخراج الغاز." },
            { q: "جهد شاحن بطارية 72v هو:", o: ["72v", "84v", "90v"], c: 1, e: "لأن الـ 72v تتكون من 20 مجموعة (20*4.2 = 84 فولت)." },
            { q: "لماذا يفضل شحن البطارية بعد أن تبرد؟", o: ["لزيادة السرعة", "لحماية التركيب الكيميائي", "لا فرق"], c: 1, e: "الشحن والبطارية ساخنة يزيد الإجهاد الحراري ويقلل عدد دورات الشحن." }
        ],
        mot: [
            { q: "الموتور يصدر نحلة ولا يدور، السبب:", o: ["تلف حساس الهال", "البطارية فارغة", "الفرامل"], c: 0, e: "تعطل أحد الحساسات يمنع الكنترول من معرفة ترتيب دفع الكهرباء للملفات." },
            { q: "الموتور يدور للخلف، كيف تعالجه؟", o: ["تبديل أي سلكين فازات", "قلب البطارية", "تغيير الشاشة"], c: 0, e: "تبديل ترتيب سلكين يعكس اتجاه المجال المغناطيسي فوراً." },
            { q: "صوت طقطقة مع كل دورة موتور:", o: ["تلف البلي (Bearings)", "قوة مغناطيس", "سلك ملمس"], c: 0, e: "رمان البلي التالف يسبب احتكاكاً ميكانيكياً ويجب تبديله فوراً." },
            { q: "دخول الماء داخل الموتور يسبب:", o: ["تبريد", "صدأ الملفات والالتماس", "زيادة عزم"], c: 1, e: "الرطوبة تأكل عازل النحاس وتسبب 'شورت' داخل الموتور." },
            { q: "أسلاك حساس الهال الخمسة هي:", o: ["كهرباء وإشارة", "فازات", "للسرعة فقط"], c: 0, e: "سلكين أحمر وأسود للكهرباء (5 فولت) و3 أسلاك لإشارات المواقع." },
            { q: "ماذا تعني مقاومة صفرية بين فازتين؟", o: ["الموتور سليم", "احتراق الملفات وتلامسها", "قوة سحب"], c: 1, e: "هذا يعني وجود التماس داخلي (Short) في النحاس ويحتاج لإعادة لف." },
            { q: "سبب ضعف عزم الموتور بشكل مفاجئ:", o: ["ضعف المغناطيسات", "تلف حساس", "نقص زيت"], c: 0, e: "الحرارة العالية جداً تفقد المغناطيسات قوتها الجاذبة." },
            { q: "الجهد الواصل لحساسات الهال من الكنترول:", o: ["12v", "5v ثابت", "48v"], c: 1, e: "الكنترول يرسل دائماً 5 فولت ثابتة لتشغيل دوائر الحساسات." },
            { q: "وظيفة 'المغناطيس' في الموتور:", o: ["توليد الحركة مع الملف", "حماية الموتور", "للوزن"], c: 0, e: "التفاعل بين مجال الملفات الكهربائي والمغناطيس الدائم هو أساس الحركة." },
            { q: "الموتور Brushless يعني:", o: ["بفحمات", "بدون فحمات كربونية", "يعمل بالزيت"], c: 1, e: "يعتمد على التوزيع الإلكتروني للكهرباء بدل الاحتكاك الميكانيكي." },
            { q: "رجة قوية في الموتور عند الانطلاق:", o: ["خلل في ترتيب الأسلاك", "البطارية ضعيفة", "الإطار"], c: 0, e: "عدم توافق ترتيب الفازات مع الحساسات يسبب تخبطاً في اتجاه الدوران." },
            { q: "هل يحتاج الموتور لتزيين داخلي؟", o: ["لا (ممنوع)", "نعم كل شهر", "فقط عند الصدأ"], c: 0, e: "الموتور يعمل جافاً، الزيت قد يتلف حساسات الهال ويعيق الحركة." },
            { q: "فصل سلك فازة واحد يؤدي لـ:", o: ["توقف الموتور وصوت نحلة", "نصف السرعة", "لا شيء"], c: 0, e: "الموتور يحتاج للفازات الثلاثة معاً لتكوين مجال دوار." },
            { q: "كيف تبرد الموتور في المسافات الطويلة؟", o: ["بالتوقف كل فترة", "بصب ماء", "بزيادة السرعة"], c: 0, e: "التوقف يريح الملفات ويمنع وصولها لدرجة حرارة تفقد المغناطيس قوته." },
            { q: "سلك حساس الهال الأخضر انقطع، ماذا يحدث؟", o: ["يفقد الموتور العزم ويرتج", "يدور أسرع", "ينطفئ الضوء"], c: 0, e: "فقدان إشارة واحدة يجعل الكنترول يرسل الكهرباء في وقت خاطئ." }
        ],
        con: [
            { q: "رمز الخطأ E10 هو:", o: ["عطل اتصال (Communication)", "عطل موتور", "بطارية"], c: 0, e: "يعني أن الشاشة لا تستطيع التحدث مع الكنترول، افحص الأسلاك." },
            { q: "وظيفة الموسفت (Mosfet) في الكنترول:", o: ["فتح وغلق التيار للموتور", "تخزين البيانات", "قياس الفولت"], c: 0, e: "هي البوابات التي تمرر الأمبير العالي للموتور بناءً على إشارة المقبض." },
            { q: "لماذا ينفجر الكنترول عند عكس القطبية؟", o: ["لانفجار المكثفات", "بسبب الشاشة", "لا ينفجر"], c: 0, e: "المكثفات الكيميائية قطبية، وعكسها يسبب انفجاراً فورياً للدوائر." },
            { q: "سلك التعلم (Learning) يستخدم لـ:", o: ["برمجة الاتجاه", "زيادة السرعة", "شحن الهاتف"], c: 0, e: "يجعل الكنترول يختبر ترتيب الأسلاك ويحفظ الوضع الصحيح تلقائياً." },
            { q: "رمز E07 يعني غالباً:", o: ["عطل موتور/حساسات", "عطل مقبض", "عطل فرامل"], c: 0, e: "المستشعر يخبر الشاشة أن الموتور لا يستجيب للنبضات." },
            { q: "رمز E08 يعني:", o: ["عطل في مقبض السرعة", "عطل بطارية", "عطل إضاءة"], c: 0, e: "المقبض (Throttle) يرسل إشارة خارج النطاق أو سلكه مقطوع." },
            { q: "وظيفة سلك الفرامل الرفيع:", o: ["قطع الكهرباء عن الموتور أماناً", "تشغيل الإضاءة", "شحن"], c: 0, e: "فور الضغط على الفرامل، يفصل الكنترول الدفع لضمان التوقف السريع." },
            { q: "الشرارة عند توصيل البطارية بالكنترول:", o: ["طبيعية (شحن مكثفات)", "دليل عطل", "التماس"], c: 0, e: "المكثفات الكبيرة تسحب تياراً لحظياً عالياً عند أول لمسة للبطارية." },
            { q: "ما هو الـ Shunt؟", o: ["سلك سميك لقياس الأمبير", "فيوز", "مفتاح"], c: 0, e: "عن طريق قياس الجهد على الشنت، يعرف الكنترول كمية السحب ويحمي نفسه." },
            { q: "سخونة الكنترول الشديدة تعني:", o: ["حمل زائد أو تلف موسفت", "البطارية قوية", "عطل شاشة"], c: 0, e: "المقاومة العالية بسبب عطل داخلي أو سحب أمبير فوق الطاقة تولد حرارة." },
            { q: "هل يمكن تشغيل كنترول 36v على بطارية 60v؟", o: ["لا (يحترق فوراً)", "نعم", "ممكن"], c: 0, e: "المكثفات والدوائر مصممة لجهد معين، والزيادة تحرق المكونات." },
            { q: "سلك القفل (Ignition) الرفيع وظيفته:", o: ["تشغيل الكنترول", "إضاءة", "بوري"], c: 0, e: "هو السلك الذي يعطي الأمر للكنترول بالاستيقاظ والعمل." },
            { q: "ماذا يحدث لو تعطل موسفت واحد؟", o: ["يتوقف الموتور أو يرتج بشدة", "لا يتأثر", "تزيد السرعة"], c: 0, e: "يحدث اختلال في توزيع الفازات مما يسبب رعشة قوية وصوتاً خشناً." },
            { q: "كيف تزيد سرعة الدراجة برمجياً؟", o: ["من إعدادات الشاشة (P-Settings)", "بتغيير البطارية", "بتغيير الإطارات"], c: 0, e: "بعض الشاشات تسمح بفك القيود عن السرعة القصوى من قائمة الإعدادات." },
            { q: "وظيفة مكثفات الكنترول الكبيرة:", o: ["تنعيم التيار وحماية الدائرة", "توليد كهرباء", "للزينة"], c: 0, e: "تمتص تذبذبات التيار وتحافظ على استقرار الفولت للموسفت." }
        ]
    };

    function askName() {
        let name = prompt("أهلاً بك في أكاديمية المحترف.\nالرجاء إدخال اسمك الثلاثي لطلب الاشتراك في الكورس (الرسوم 30,000 ج.س):");
        if(name && name.length > 5) {
            const text = `مرحباً أستاذ محمد طه، أنا المتدرب: ${name}. أود الاشتراك في الكورس التدريبي الشامل (الرسوم 30,000 ج.س).`;
            window.open(`https://wa.me/249999240574?text=${encodeURIComponent(text)}`, '_blank');
        } else if(name) {
            alert("الرجاء كتابة الاسم الثلاثي بوضوح.");
        }
    }

    function load(part, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const area = document.getElementById('quiz-area');
        area.innerHTML = (db[part] || []).map((item, i) => `
            <div class="q-card">
                <p><b>س${i+1}:</b> ${item.q}</p>
                ${item.o.map((opt, oi) => `<div class="opt" onclick="check(this, ${oi==item.c}, '${item.e.replace(/'/g, "\\'")}')">${opt}</div>`).join('')}
            </div>
        `).join('');
    }

    function check(el, ok, exp) {
        if(ok) {
            el.classList.add('correct-opt');
            showEdu("إجابة صحيحة أيها المتدربون المتميزون ✅", exp);
        } else {
            el.classList.add('wrong-opt');
            showEdu("توضيح فني للمتدربين 💡", exp);
        }
    }

    function showEdu(title, text) {
        document.getElementById('status-title').innerText = title;
        document.getElementById('edu-text').innerText = text;
        document.getElementById('edu-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edu-modal').style.display = 'none'; }

    window.onload = () => load('bat', document.querySelector('.tab'));
</script>

</body>
</html>
